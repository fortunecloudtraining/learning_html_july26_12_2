<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h2>All Input Types</h2>
        <form>
            <!-- //First Name -->
            <label>Enter First Name</label>
            <input type="text" placeholder="Enter first Name" />
            <br><br>
            <!-- //Last name -->
            <label>Enter Last Name</label>
            <input type="text" placeholder="Enter Last Name" />
            <br><br>
            <!-- //Email -->
            <label>Enter Email Id</label>
            <input type="email" placeholder="Enter Email Id" />
            <br><br>
            <label>Enter Phone Number</label>
            <input type="number" placeholder="Enter Phone Number" />
            <br><br>
            <label>Enter Password</label>
            <input type="password" placeholder="Enter Password" />
            <br><br>
            <label>Date of Birth</label>
            <input type="date" />
            <label>Month</label>
            <input type="month" />
            <label>Week</label>
            <input type="week" />
            <label>Time</label>
            <input type="time" />
            <br>
            <label>Date and Time</label>
            <input type="datetime-local" />
            <br> <br>
            <label>Select Color</label>
            <input type="color" />
            <br> <br>
            <label>Select Range</label>
            <input type="range" />
            <br> <br>
            <label>Upload Docs</label>
            <input type="file" multiple />
            <br> <br>
            <label>Serach</label>
            <input type="search" />
            <br> <br>
            <label>Enter URL</label>
            <input type="url" />
            <br> <br>
            <label>Enter Telephone</label>
            <input type="tel" />
            <br> <br>
            <label>Choose Any 2 Cities</label>
            <input type="checkbox" checked /> Mumbai
            <input type="checkbox" /> Delhi
            <input type="checkbox" /> Bangalore
            <input type="checkbox" /> Chennai
            <br><br>
            <label>Select Gender</label>
            <input type="radio" name="gender" />Male
            <input type="radio" name="gender" />FeMale
            <input type="radio" name="gender" />Other
            <br><br>
            <label>Select Your Fav Sweet Dish</label>
            <select>
                <option>Choose....</option>
                <option>Kaju Katali</option>
                <option>Rasgulla</option>
                <option>Milk Cake</option>
                <option>Kalkand</option>
                <option>Gulabjamun</option>
                <option>Jilebi</option>
                <option>Sitafal Rabdi</option>
                <option>Tiramasu</option>
                <option>Chocklate</option>
            </select>
            <textarea rows="5" cols="40"></textarea>

            <input type="submit" value="Submit Form" />
            <input type="button" value="Submit Form" />
            <input type="reset" value="Reset Form" />

        </form>

    </body>
</html>
